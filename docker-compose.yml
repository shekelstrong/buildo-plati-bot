# ============================================================
# Buildo Plati Bot — общий compose (бот + cron для парсера)
# ============================================================
version: "3.9"

services:
  bot:
    build: .
    container_name: buildo-plati-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import sqlite3; sqlite3.connect('/app/data/plati_delivery.db').close()"]
      interval: 60s
      timeout: 5s
      retries: 3

  # Отдельный контейнер для парсера по крону (опционально, если хочешь
  # держать cron отдельно от бота). Сейчас cron внутри bot.
  parser:
    profiles: ["separate-parser"]
    build: .
    container_name: buildo-plati-parser
    restart: unless-stopped
    command: python3 parser.py --watch --interval 3600
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs