# Nginx reverse-proxy для Platega webhook
# Положить в /etc/nginx/sites-available/platega-webhook.conf
# ln -s /etc/nginx/sites-available/platega-webhook.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name nemovpn.cfd;

    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Platega webhook — проксируем на Docker контейнер
    location /webhook/platega {
        proxy_pass http://127.0.0.1:8080/webhook/platega;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Platega webhook timeout (обычно быстрый)
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # Закрыть всё остальное
    location / {
        return 404 "Not Found";
    }
}

